name: ios-setup-test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-setup:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show repo files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | head -n 100

      - name: Install dependencies
        run: npm install

      - name: Check Capacitor packages
        run: npm ls @capacitor/cli @capacitor/core @capacitor/ios || true

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios@^8.1.0 --save

      - name: Build web app
        run: npm run build

      - name: Show Capacitor config
        run: cat capacitor.config.json

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync iOS
        run: npx cap sync ios

      - name: Inspect Capacitor output
        run: |
          ls -la
          if [ -d "ios" ]; then
            echo "ios klasoru olustu"
            find ios -maxdepth 5 -type d | head -n 100
            find ios -maxdepth 5 -type f | head -n 200
          else
            echo "ios klasoru hic olusmadi"
            exit 1
          fi

      - name: Verify Podfile exists
        run: |
          PODFILE=$(find ios -name Podfile | head -n 1)
          if [ -z "$PODFILE" ]; then
            echo "Podfile bulunamadi"
            exit 1
          fi
          echo "Podfile bulundu: $PODFILE"
