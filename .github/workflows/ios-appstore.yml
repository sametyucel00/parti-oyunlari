name: ios-setup-test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-setup:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios@^8.1.0 --save

      - name: Build web app
        run: npm run build

      - name: Show Capacitor config
        run: cat capacitor.config.json

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync iOS
        run: npx cap sync ios

      - name: Inspect iOS output
        run: |
          if [ ! -d "ios" ]; then
            echo "ios klasoru hic olusmadi"
            exit 1
          fi

          echo "ios klasoru bulundu"
          find ios -maxdepth 5 -type d | head -n 100
          find ios -maxdepth 5 -type f | head -n 200

      - name: Verify Xcode project exists
        run: |
          if [ -f "ios/App/App.xcodeproj/project.pbxproj" ]; then
            echo "Xcode project bulundu"
            exit 0
          fi

          if [ -f "ios/App/App.xcworkspace/contents.xcworkspacedata" ]; then
            echo "Xcode workspace bulundu"
            exit 0
          fi

          if find ios -name "Package.swift" | grep -q "Package.swift"; then
            echo "Swift Package Manager yapisi bulundu"
            exit 0
          fi

          echo "iOS native proje dosyalari bulunamadi"
          exit 1
