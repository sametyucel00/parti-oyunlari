name: ios-archive-test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-archive:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      APP_IDENTIFIER: com.partioyunlari.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios@^8.1.0 --save

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync iOS
        run: npx cap sync ios

      - name: Inspect iOS project
        run: |
          find ios -maxdepth 5 -type f | head -n 200

      - name: Locate Xcode project
        run: |
          PROJECT_FILE=$(find ios -name "*.xcodeproj" | head -n 1)
          WORKSPACE_FILE=$(find ios -name "*.xcworkspace" | head -n 1)

          if [ -n "$PROJECT_FILE" ]; then
            echo "XCODE_PROJECT=$PROJECT_FILE" >> $GITHUB_ENV
            echo "Xcode project bulundu: $PROJECT_FILE"
          fi

          if [ -n "$WORKSPACE_FILE" ]; then
            echo "XCODE_WORKSPACE=$WORKSPACE_FILE" >> $GITHUB_ENV
            echo "Xcode workspace bulundu: $WORKSPACE_FILE"
          fi

      - name: Detect scheme
        run: |
          if [ -n "$XCODE_WORKSPACE" ]; then
            SCHEME=$(xcodebuild -list -workspace "$XCODE_WORKSPACE" | awk '/Schemes:/{getline; print $1}')
          else
            SCHEME=$(xcodebuild -list -project "$XCODE_PROJECT" | awk '/Schemes:/{getline; print $1}')
          fi

          echo "XCODE_SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "Scheme: $SCHEME"

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/app.mobileprovision"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")

          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Provisioning profile: $PROFILE_NAME"

      - name: Archive app
        run: |
          mkdir -p build

          if [ -n "$XCODE_WORKSPACE" ]; then
            xcodebuild \
              -workspace "$XCODE_WORKSPACE" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -archivePath build/App.xcarchive \
              -destination "generic/platform=iOS" \
              DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
              PRODUCT_BUNDLE_IDENTIFIER="$APP_IDENTIFIER" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
              clean archive
          else
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -archivePath build/App.xcarchive \
              -destination "generic/platform=iOS" \
              DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
              PRODUCT_BUNDLE_IDENTIFIER="$APP_IDENTIFIER" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
              clean archive
          fi

      - name: Verify archive
        run: |
          if [ -d "build/App.xcarchive" ]; then
            echo "Archive olustu"
            find build/App.xcarchive -maxdepth 3 -type f | head -n 100
          else
            echo "Archive olusmadi"
            exit 1
          fi
